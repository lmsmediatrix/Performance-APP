name: Deploy to Firebase Hosting on merge
"on":
  push:
    branches:
      - test
      - dev
      - main
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_deploy_test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    env:
      VITE_BASE_URL: https://ps-api-develop-cpn5wtzfia-as.a.run.app/api
      VITE_LMS_BASE_URL: https://lms-api-develop-763972588311.asia-southeast1.run.app/api
    steps:
      - uses: actions/checkout@v3
      - name: Set environment variables
        run: |
          echo "VITE_BASE_URL=${{ env.VITE_BASE_URL }}" >> .env
          echo "VITE_LMS_BASE_URL=${{ env.VITE_LMS_BASE_URL }}" >> .env
          echo "VITE_CLOUDINARY_PATH=${{ secrets.VITE_CLOUDINARY_PATH_TEST }}" >> .env
      - name: Build
        run: npm ci && npm run build
        env:
          CI: false
          VITE_BASE_URL: ${{ env.VITE_BASE_URL }}
          VITE_LMS_BASE_URL: ${{ env.VITE_LMS_BASE_URL }}
          VITE_CLOUDINARY_PATH: ${{ secrets.VITE_CLOUDINARY_PATH_TEST }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEDIATRIX_PERFORMANCE_APP_DEV }}"
          channelId: live
          projectId: mediatrix-performance-app-dev

  build_and_deploy_dev:
